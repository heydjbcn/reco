name: Reco
options:
  bundleIdPrefix: com.mauri
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: es
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "47BY9SGLT7"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  Reco:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Reco
    resources:
      - path: Reco/Resources/Assets.xcassets
    info:
      path: Reco/Info.plist
      properties:
        CFBundleDisplayName: "Reco"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: AccentColor
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSContactsUsageDescription: "Reco usa tus contactos para ayudarte a no olvidar a las personas importantes."
        NSCameraUsageDescription: "Para añadir fotos a las personas."
        NSPhotoLibraryUsageDescription: "Para seleccionar fotos de personas."
        NSFaceIDUsageDescription: "Protege tu lista de personas con Face ID."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mauri.reco
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
